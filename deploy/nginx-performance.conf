# Include this inside your server {} block.

# Compression
brotli on;
brotli_comp_level 5;
brotli_types text/plain text/css text/javascript application/javascript application/json application/xml image/svg+xml;

gzip on;
gzip_comp_level 6;
gzip_min_length 1024;
gzip_vary on;
gzip_proxied any;
gzip_types text/plain text/css text/javascript application/javascript application/json application/xml image/svg+xml;

# Immutable static assets
location ~* \.(?:js|css|png|jpe?g|gif|svg|webp|ico|woff2?|ttf)$ {
  expires 1y;
  add_header Cache-Control "public, max-age=31536000, immutable";
  try_files $uri =404;
}

# HTML and feeds should revalidate quickly
location ~* \.(?:html|xml|txt)$ {
  expires -1;
  add_header Cache-Control "public, max-age=0, must-revalidate";
}
